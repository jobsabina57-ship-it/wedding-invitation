<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabina & John</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(to bottom, #ffffff, #f6efe7);
  overflow-x:hidden;
  text-align:center;
  color:#000;
}

/* subtle floral background */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:url('https://www.transparenttextures.com/patterns/flowers.png');
  opacity:0.04;
  z-index:-1;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.names{
  font-family:'Playfair Display', serif;
  font-size:42px;
  color:#c6a74a;
  letter-spacing:2px;
  animation:fadeIn 2s ease forwards;
}

.subtitle{
  margin-top:10px;
  font-size:18px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.circle-date{
  position:relative;
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid #c6a74a;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  font-family:'Playfair Display', serif;
  margin-top:40px;
  overflow:hidden;
}

#scratchCanvas{
  position:absolute;
  top:0;
  left:0;
}

.message{
  margin-top:30px;
  opacity:0;
  transition:1s;
  max-width:300px;
}

.countdown{
  margin-top:20px;
  font-size:18px;
  color:#c6a74a;
}

button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  background:#c6a74a;
  color:white;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
  display:none;
}

button:hover{
  background:#b8973e;
}

.confetti{
  position:fixed;
  width:8px;
  height:8px;
  background:#c6a74a;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>
<body>

<section>
  <div class="names">Sabina & John</div>
  <div class="subtitle">are getting married</div>

  <div class="circle-date">
    22 August 2028
    <canvas id="scratchCanvas"></canvas>
  </div>

  <div class="countdown" id="countdown"></div>

  <div class="message" id="message">
    We can’t wait to celebrate this beautiful day with you 🤍<br>
    Kindly note: Invitation valid for one guest only.
  </div>

  <button id="rsvpBtn">Confirm Attendance (RSVP)</button>
</section>

<script>
/* COUNTDOWN */
const weddingDate = new Date("August 22, 2028 00:00:00").getTime();
const countdownEl = document.getElementById("countdown");

setInterval(()=>{
  const now = new Date().getTime();
  const diff = weddingDate - now;

  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((diff%(1000*60*60))/(1000*60));

  countdownEl.innerHTML = days+" days | "+hours+" hrs | "+minutes+" min remaining";
},1000);

/* SCRATCH EFFECT */
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");
const circle = document.querySelector(".circle-date");

canvas.width = circle.offsetWidth;
canvas.height = circle.offsetHeight;

ctx.fillStyle = "#e0d6c8";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let isDrawing=false;

canvas.addEventListener("mousedown", ()=> isDrawing=true);
canvas.addEventListener("mouseup", ()=> isDrawing=false);
canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("touchstart", ()=> isDrawing=true);
canvas.addEventListener("touchend", ()=> isDrawing=false);
canvas.addEventListener("touchmove", scratch);

function scratch(e){
  if(!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.beginPath();
  ctx.arc(x,y,20,0,Math.PI*2);
  ctx.fill();

  checkReveal();
}

function checkReveal(){
  const pixels = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let transparent=0;
  for(let i=3;i<pixels.length;i+=4){
    if(pixels[i]===0) transparent++;
  }
  if(transparent > pixels.length/8){
    document.getElementById("message").style.opacity=1;
    document.getElementById("rsvpBtn").style.display="inline-block";
    startConfetti();
  }
}

/* CONFETTI */
function startConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.classList.add("confetti");
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);
  }
}

/* RSVP */
document.getElementById("rsvpBtn").onclick=()=>{
  alert("Thank you for confirming 🤍 We can't wait to see you!");
};
</script>

</body>
</html>
