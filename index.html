<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>John & Sabina's Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(to bottom,#ffffff,#f5eee6);
text-align:center;
color:#000;
overflow-x:hidden;
}

/* floral background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:url("https://www.transparenttextures.com/patterns/flowers.png");
opacity:0.05;
z-index:-1;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.names{
font-family:'Playfair Display',serif;
font-size:46px;
color:#c6a74a;
letter-spacing:2px;
animation:fade 2s ease;
}

.subtitle{
margin-top:10px;
font-size:18px;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.date-circle{
width:230px;
height:230px;
border-radius:50%;
border:3px solid #c6a74a;
display:flex;
justify-content:center;
align-items:center;
font-family:'Playfair Display',serif;
font-size:22px;
cursor:pointer;
transition:1s;
}

.hidden-date{
opacity:0;
transition:1s;
}

.spin{
transform:rotate(360deg);
}

.countdown{
margin-top:25px;
font-size:20px;
color:#c6a74a;
}

.message{
margin-top:30px;
max-width:320px;
opacity:0;
transition:1s;
}

button{
margin-top:15px;
padding:12px 28px;
border:none;
border-radius:25px;
background:#c6a74a;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b8963b;
}

.rsvp{
display:none;
margin-top:20px;
}

.map-container{
margin-top:40px;
width:90%;
max-width:500px;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:none;
}

.confetti{
position:fixed;
width:8px;
height:8px;
background:#c6a74a;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>
</head>

<body>

<section>

<div class="names">Sabina & John</div>

<div class="subtitle">are getting married</div>

<br>

<div class="date-circle" id="circle" onclick="revealDate()">

<div id="date" class="hidden-date">
22 August 2028
</div>

</div>

<div id="countdown" class="countdown"></div>

<div id="message" class="message">

We can't wait to celebrate this beautiful day with you 🤍
<br><br>
Kindly note: Invitation valid for one guest only.

</div>

<div class="rsvp" id="rsvpButtons">

<button onclick="sendRSVP('yes')">
I will attend 🤍
</button>

<br>

<button onclick="sendRSVP('no')" style="background:#888;">
Sorry, I can't attend
</button>

</div>

<div class="map-container" id="map">

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=30.0444,31.2357&output=embed">
</iframe>

</div>

</section>

<script>

function revealDate(){

let circle=document.getElementById("circle")
let date=document.getElementById("date")

circle.classList.add("spin")

setTimeout(()=>{

date.style.opacity=1

document.getElementById("message").style.opacity=1

document.getElementById("rsvpButtons").style.display="block"

document.getElementById("map").style.display="block"

startConfetti()

},700)

}

const weddingDate=new Date("August 22, 2028 00:00:00").getTime()

const countdown=document.getElementById("countdown")

setInterval(()=>{

let now=new Date().getTime()

let diff=weddingDate-now

let days=Math.floor(diff/(1000*60*60*24))
let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
let minutes=Math.floor((diff%(1000*60*60))/(1000*60))

countdown.innerHTML=
days+" days | "+hours+" hrs | "+minutes+" min remaining"

},1000)

function startConfetti(){

for(let i=0;i<70;i++){

let conf=document.createElement("div")

conf.classList.add("confetti")

conf.style.left=Math.random()*100+"vw"

conf.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(conf)

}

}

function sendRSVP(answer){

const formID="1FAIpQLSf5u0HxPQZbrlzsoCK1-JrYVVRLo-TBR0fMEhPQDbWYagItgw"

alert("Thank you for your response 🤍")

window.open(`https://docs.google.com/forms/d/e/${formID}/viewform`)

}

</script>

</body>
</html>
